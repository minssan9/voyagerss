# Gemini Code Assist 저장소 설정
# https://developers.google.com/gemini-code-assist/docs/customize-gemini-behavior-github

have_fun: false

code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: -1
  pull_request_opened:
    help: false
    summary: true
    code_review: true

ignore_patterns:
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/*.lock"
  - "**/package-lock.json"
  - "**/*.min.js"
  - "**/*.min.css"
  - "**/coverage/**"
  - "**/*.prisma"
  - "**/generated/**"
