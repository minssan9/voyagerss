name: Deploy Backend (Docker Compose)

on:
  workflow_run:
    workflows: ["Unified CI"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: Fix Git Safe Directory
      run: git config --global --add safe.directory '*'

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Write .env from Secret
      shell: powershell
      env:
        DOTENV_CONTENT: ${{ secrets.DOTENV_PROD }}
      run: |
        $path = Join-Path $env:GITHUB_WORKSPACE ".env"
        [System.IO.File]::WriteAllText($path, $env:DOTENV_CONTENT, [System.Text.Encoding]::UTF8)

    - name: Deploy with Docker Compose
      run: docker compose up -d --build backend
