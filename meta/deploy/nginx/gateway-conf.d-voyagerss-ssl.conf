# Voyagerss HTTPS — mirrors gateway-conf.d-voyagerss.conf HTTP locations
# Upstreams/map: voyagerss.conf (same conf.d dir) — do not duplicate here
# Certs: /etc/nginx/ssl/voyagerss/ (deploy-certs.sh from certbot/conf/live/voyagerss/)

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.voyagerss.com;

    ssl_certificate     /etc/nginx/ssl/voyagerss/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/voyagerss/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    location = /health {
        proxy_pass http://voyagerss_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $voyagerss_forwarded_proto;
        access_log off;
    }

    location /api/ {
        proxy_pass http://voyagerss_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $voyagerss_forwarded_proto;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 20m;
    }

    location /socket.io/ {
        proxy_pass http://voyagerss_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $voyagerss_forwarded_proto;
        proxy_read_timeout 86400s;
    }

    location / {
        return 404;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name voyagerss.com www.voyagerss.com;

    ssl_certificate     /etc/nginx/ssl/voyagerss/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/voyagerss/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    location / {
        proxy_pass http://voyagerss_fe;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $voyagerss_forwarded_proto;
    }
}
