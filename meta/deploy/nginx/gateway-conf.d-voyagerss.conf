# Voyagerss — drop into /data/gateway/nginx/conf.d/voyagerss.conf
# Upstream: host.docker.internal (gateway container → host :9002 / :9003)
# Requires gateway docker-compose extra_hosts: host.docker.internal:host-gateway

map $http_x_forwarded_proto $voyagerss_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

upstream voyagerss_api {
    server __VOYAGERSS_UPSTREAM_HOST__:9002 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream voyagerss_fe {
    server __VOYAGERSS_UPSTREAM_HOST__:9003 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.voyagerss.com;

    location = /health {
        proxy_pass http://voyagerss_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $voyagerss_forwarded_proto;
        access_log off;
    }

    location /api/ {
        proxy_pass http://voyagerss_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $voyagerss_forwarded_proto;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 20m;
    }

    location /socket.io/ {
        proxy_pass http://voyagerss_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $voyagerss_forwarded_proto;
        proxy_read_timeout 86400s;
    }

    location / {
        return 404;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name voyagerss.com www.voyagerss.com;

    location / {
        proxy_pass http://voyagerss_fe;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $voyagerss_forwarded_proto;
    }
}
