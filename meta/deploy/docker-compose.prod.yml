# Production runtime — pre-built GHCR images only (no build:).
# Source: meta/deploy/docker-compose.prod.yml
# Copied to /data/voyagerss/docker-compose.yml by .github/workflows/deploy-production.yml
# Requires: GITHUB_OWNER, IMAGE_TAG, .env (DOTENV_PROD on server)
# Usage on droplet:
#   export GITHUB_OWNER=<owner> IMAGE_TAG=<sha|latest>
#   docker compose pull && docker compose up -d
#
# Shares en9door_net with /data/gateway nginx for direct container upstream routing.

services:
  redis:
    image: redis:7-alpine
    container_name: voyagerss-redis
    restart: unless-stopped
    networks:
      - default

  backend:
    image: ghcr.io/${GITHUB_OWNER}/voyagerss-backend:${IMAGE_TAG}
    container_name: voyagerss-backend
    restart: unless-stopped
    depends_on:
      - redis
    env_file: .env
    environment:
      NODE_ENV: production
      BACKEND_PORT: "9002"
      BACKEND_HOST: "0.0.0.0"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      # Host bind for CI health checks; gateway uses en9door_net (voyagerss-backend:9002).
      - "9002:9002"
    volumes:
      - ./data:/app/data
    networks:
      - default
      - en9door_net

  frontend:
    image: ghcr.io/${GITHUB_OWNER}/voyagerss-frontend:${IMAGE_TAG}
    container_name: voyagerss-frontend
    restart: unless-stopped
    ports:
      - "9003:80"
    networks:
      - default
      - en9door_net

networks:
  en9door_net:
    external: true
