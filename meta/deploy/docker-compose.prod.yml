# Production runtime — pre-built GHCR images only (no build:).
# Source: meta/deploy/docker-compose.prod.yml
# Copied to /data/voyagerss/docker-compose.yml by .github/workflows/deploy-production.yml
# Requires: GITHUB_OWNER, IMAGE_TAG, .env (DOTENV_PROD on server)
# Usage on droplet:
#   export GITHUB_OWNER=<owner> IMAGE_TAG=<sha|latest>
#   docker compose pull && docker compose up -d

services:
  backend:
    image: ghcr.io/${GITHUB_OWNER}/voyagerss-backend:${IMAGE_TAG}
    container_name: voyagerss-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      BACKEND_PORT: "9002"
      BACKEND_HOST: "0.0.0.0"
    ports:
      # Bind all interfaces so Docker gateway (host.docker.internal) can reach the service.
      # Block 9002/9003 at the firewall; only :80 is public via gateway nginx.
      - "9002:9002"
    volumes:
      - ./data:/app/data

  frontend:
    image: ghcr.io/${GITHUB_OWNER}/voyagerss-frontend:${IMAGE_TAG}
    container_name: voyagerss-frontend
    restart: unless-stopped
    ports:
      - "9003:80"
