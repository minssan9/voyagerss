# Reference: API vhost — merge into existing gateway nginx (see GATEWAY-NGINX-MERGE-PROMPT.md).
# Fresh install only: INSTALL_MODE=standalone bash deploy/scripts/install-nginx-site.sh
# TLS terminates at DigitalOcean Load Balancer (HTTPS:443 → HTTP:80).

upstream voyagerss_api {
    server 127.0.0.1:9002;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.voyagerss.com;

    location = /health {
        proxy_pass http://voyagerss_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        access_log off;
    }

    location /api/ {
        proxy_pass http://voyagerss_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 20m;
    }

    location /socket.io/ {
        proxy_pass http://voyagerss_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 86400s;
    }

    location / {
        return 404;
    }
}
