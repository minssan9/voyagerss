# Reference: apex SPA — merge into existing gateway nginx (see GATEWAY-NGINX-MERGE-PROMPT.md).
# Upstream: Docker frontend on 127.0.0.1:9003

upstream voyagerss_fe {
    server 127.0.0.1:9003;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name voyagerss.com;

    location / {
        proxy_pass http://voyagerss_fe;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
