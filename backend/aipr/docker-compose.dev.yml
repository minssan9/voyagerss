version: '3.9'

# MySQL & Redis는 로컬에 기존 서비스 사용 (localhost:3306 / localhost:6379)
# 이 파일은 adminer UI만 실행합니다.

services:
  adminer:
    image: adminer:4
    container_name: auto-pr-adminer
    restart: unless-stopped
    # Host 18080 avoids clashing with Voyagerss Vite (often :8080)
    ports:
      - '18080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: host.docker.internal
      ADMINER_DEFAULT_DRIVER: mysql

networks:
  default:
    name: auto-pr-dev
