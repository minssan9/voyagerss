##############################################################################
# docker-compose.staging.yml
#
# Staging 환경 구성: API + Worker + Adminer
# MySQL/Redis는 호스트에서 실행 중인 로컬 서비스를 host.docker.internal 로 연결.
#
# 사용:
#   cp .env.sample .env          # 환경변수 채우기
#   docker compose -f docker/docker-compose.staging.yml up -d --build
#
# 주의:
#   - .env 는 절대 커밋하지 말 것 (.gitignore 에 포함됨)
#   - ANTHROPIC_API_KEY, GITHUB_APP_PRIVATE_KEY_BASE64 등 민감 값은
#     KMS/Doppler로 관리 권장 (Phase 6 TODO)
##############################################################################

version: '3.9'

services:
  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: auto-pr-api:staging
    restart: unless-stopped
    env_file: ../.env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - adminer
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Worker ──────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    image: auto-pr-worker:staging
    restart: unless-stopped
    env_file: ../.env
    environment:
      NODE_ENV: production
    # Claude Code CLI 가 /tmp/workspaces/<runId> 에 repo 클론 및 작업
    tmpfs:
      - /tmp/workspaces:size=2g,mode=1777
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ── Adminer (DB 관리 UI) ────────────────────────────────────────────────────
  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  default:
    name: auto-pr-staging
