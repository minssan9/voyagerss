<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback Widget — React (CDN) Demo</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background:#f7f7f8; color:#111;
      display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .app { background:#fff; border-radius:16px; padding:40px; box-shadow:0 2px 16px rgba(0,0,0,0.08); }
    h1   { font-size:22px; font-weight:700; margin-bottom:8px; }
    p    { color:#6e6e73; font-size:14px; margin-bottom:20px; }
    button { padding:10px 20px; border:none; border-radius:8px;
      background:#0A84FF; color:#fff; font-size:14px; font-weight:500; cursor:pointer; }
    button:hover { background:#0071e3; }
  </style>
</head>
<body>
<div id="root"></div>

<!-- Feedback Widget (pre-load queue) -->
<script>window.FeedbackQueue = [['identify', { email: 'react-demo@example.com' }]];</script>
<script src="../dist/embed.umd.js" data-app-id="react-demo" data-locale="ko"></script>

<script type="text/babel">
function App() {
  const [submitted, setSubmitted] = React.useState(false);

  React.useEffect(() => {
    if (typeof Feedback !== 'undefined') {
      Feedback.on('submitted', (p) => {
        setSubmitted(true);
        console.log('Issue ID:', p?.issueId);
      });
    }
  }, []);

  return (
    <div className="app">
      <h1>React Demo</h1>
      <p>{submitted ? '✅ 피드백이 제출되었습니다!' : '아래 버튼으로 위젯을 열어보세요.'}</p>
      <button onClick={() => window.Feedback?.open()}>피드백 보내기</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
