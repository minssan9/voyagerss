# Local development: build backend from source.
# Production (DigitalOcean): /data/voyagerss/docker-compose.yml from deploy/docker-compose.api.yml
# Images: ghcr.io/<owner>/voyagerss-{backend,frontend} — see .github/workflows/deploy-production.yml

version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voyagerss-backend
    ports:
      - "9002:9002"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - backend-data:/app/data
    restart: always

volumes:
  backend-data:
    driver: local
