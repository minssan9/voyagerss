version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voyagerss-backend
    ports:
      - "9002:9002"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - backend-data:/app/data
    restart: always

volumes:
  backend-data:
    driver: local
