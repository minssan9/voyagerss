version: 0.0
os: linux

files:
  - source: /backend
    destination: /home/ec2-user/voyagerss/backend

permissions:
  - object: /home/ec2-user/voyagerss
    owner: ec2-user
    group: ec2-user
    mode: 755
    type:
      - directory
      - file

hooks:
  ApplicationStop:
    - location: scripts/stop-server.sh
      timeout: 30
      runas: ec2-user

  AfterInstall:
    - location: scripts/after-install.sh
      timeout: 60
      runas: ec2-user

  ApplicationStart:
    - location: scripts/start-server.sh
      timeout: 30
      runas: ec2-user

  ValidateService:
    - location: scripts/validate-service.sh
      timeout: 30
      runas: ec2-user
